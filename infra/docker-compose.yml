version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: sales
      POSTGRES_PASSWORD: sales
      POSTGRES_DB: sales
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - saleshq
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrantdata:/qdrant/storage
    ports:
      - "6333:6333"
    networks:
      - saleshq
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "grep -q ':18BD' /proc/net/tcp || grep -q ':18BD' /proc/net/tcp6",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    networks:
      - saleshq
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    volumes:
      - n8ndata:/home/node/.n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=n8n
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=UTC
    networks:
      - saleshq
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "grep -q ':162E' /proc/net/tcp || grep -q ':162E' /proc/net/tcp6",
        ]
      interval: 15s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://sales:sales@postgres:5432/sales
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
    networks:
      - saleshq
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    env_file:
      - path: ../.env
        required: false
    networks:
      - saleshq
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://localhost:3000',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 5

networks:
  saleshq:
    driver: bridge

volumes:
  pgdata:
  qdrantdata:
  redisdata:
  n8ndata:
